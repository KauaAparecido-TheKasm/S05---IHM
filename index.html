<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Meu Curriculo </title>
    <!-- <link rel="stylesheet" href="https://rcmp-collab.github.io/S05-IHM/cadex.css"> Aqui faz o link para o arquivo do CSS  -->
    
    <style> 
        
        h1 {color: red;}

        .red{background-color: black;} /* Se refere ao estilo da CLasse */
        #head{background-color: green;} /* Se refere ao estilo da propriedade */

        #profissao{color: #004080;}
        .competencias{color: #Daa520;}
        li.destaque{color: red;}
        
        div > p {color: white; background-color: green;} <!-- Toda Div que tem um parágrafo, vai seguir isso-->

        a[target='_blnk'] {color: #C71585;}

    </style>
    
    
    </head>
    <body>
        
        <h1> Kauã Aparecido Silva Morais </h1> <!-- Isso aqui é um parágrafo-->
        <h2 id="profissao"> Engenheiro de Software </h2> <!-- Isso é outro parágrafo -->
        <a href="https://inatel.br", target="_blank"> <p> Lindekin </p></a> <!--Novamente, outro parafgrafo porem com um link da tag 'a'--> <!--_blank abre uma nova pagina, self abre na mesma pagina-->
        <h3 class="competencias"> Competências </h3> <!--Mais um...-->
        <ul class='lista'> <!-- Lista não ordenada -->
            <li class="destaque">HTML</li> <!-- Listed Itens (LI) itens da lista-->
            <li >CSS</li>
            <li >JS</li>
        </ul>

        <div onclick='enviarEmail()'>E-mail</div>
        <div id='ws'><p>WhatsApp</p></div>
        <p id='msn'></p>    
        <p id="p2"> Hello World</p>

        <h1 id="id1"> My Heading 1 </h1>

        <button type="button" onclick="document.getElementById('id1').style.color = 'red'"></button>


        <script>
            function enviarEmail(){
                alert('kaua.aparecido@inatel.br');
                document.getElementById('msn').innerHTML = 'Mensagem Enviada!';
                document.getElementById('msn').style.color = "red";
            }

            document.getElementById('ws').addEventListener("click", function() {
                document.getElementById('msn').style.color = "blue";
            })

            document.getElementById("p2").style.color = "blue";
            
            /* Aula do dia 19/03 */

            let lista = document.querySelector('.lista');
            let novoItem = document.createElement('li');
            novoItem.textContent = "Framework";
            novoItem.classList.add('destaque');
            
            lista.appendChild(novoItem);

        </script>

        

    </body>
</html>
